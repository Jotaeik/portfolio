<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MZ력 기반 MBTI 테스트</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f3f4f6;
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .progress-bar {
            transition: width 0.3s ease-in-out;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <!-- Main Container -->
    <div id="game-container" class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-8 overflow-hidden relative">
        
        <!-- Start Screen -->
        <div id="start-screen" class="text-center fade-in">
            <div class="mb-6">
                <span class="inline-block bg-purple-100 text-purple-600 px-4 py-1 rounded-full text-sm font-bold mb-2">요즘 애들 테스트</span>
                <h1 class="text-3xl font-extrabold text-gray-800 leading-tight">나의 MZ 성향으로 본<br><span class="text-purple-600">진짜 MBTI는?</span></h1>
            </div>
            <p class="text-gray-500 mb-8">당신의 갓생 지수와 갓반인 지수를 확인해보세요.</p>
            <button onclick="startTest()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 rounded-2xl transition-all transform hover:scale-105 active:scale-95 shadow-lg">
                테스트 시작하기
            </button>
            <p class="text-xs text-gray-400 mt-6 italic">"어쩔티비? 저쩔티비? 쿠쿠루삥뽕"</p>
        </div>

        <!-- Question Screen -->
        <div id="question-screen" class="hidden fade-in">
            <div class="mb-4 flex justify-between items-center text-sm font-medium text-gray-400">
                <span id="question-number">1 / 12</span>
                <div class="w-2/3 bg-gray-200 h-2 rounded-full overflow-hidden">
                    <div id="progress" class="progress-bar bg-purple-500 h-full" style="width: 8.33%"></div>
                </div>
            </div>
            <h2 id="question-text" class="text-xl font-bold text-gray-800 mb-8 min-h-[4rem]"></h2>
            <div id="options" class="space-y-4">
                <!-- Buttons will be injected here -->
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden fade-in text-center">
            <div class="mb-4">
                <span class="text-gray-500 text-sm">당신의 결과는...</span>
                <h2 id="result-title" class="text-4xl font-extrabold text-purple-600 mt-2"></h2>
            </div>
            <div id="result-image" class="w-48 h-48 mx-auto mb-6 bg-purple-50 rounded-full flex items-center justify-center text-6xl">
                <!-- Emoji icon will go here -->
            </div>
            <div class="bg-gray-50 p-6 rounded-2xl mb-6 text-left">
                <p id="result-desc" class="text-gray-700 leading-relaxed"></p>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-blue-50 p-3 rounded-xl">
                    <span class="text-xs text-blue-400 block mb-1">환상의 짝꿍</span>
                    <span id="match-good" class="font-bold text-blue-700"></span>
                </div>
                <div class="bg-red-50 p-3 rounded-xl">
                    <span class="text-xs text-red-400 block mb-1">환장의 짝꿍</span>
                    <span id="match-bad" class="font-bold text-red-700"></span>
                </div>
            </div>
            <button onclick="location.reload()" class="w-full bg-gray-800 text-white font-bold py-4 rounded-2xl hover:bg-black transition-colors shadow-md">
                다시 테스트하기
            </button>
        </div>

        <!-- Loading Screen -->
        <div id="loading-screen" class="hidden absolute inset-0 bg-white flex flex-col items-center justify-center z-10">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-purple-600 mb-4"></div>
            <p class="text-gray-600 font-bold">당신의 MZ력을 분석 중...</p>
        </div>

    </div>

    <script>
        const questions = [
            {
                q: "상사가 퇴근 후 단톡방에 '오늘 다들 수고했어~'라고 보냈을 때 나의 반응은?",
                a: [{ text: "읽씹하거나 하트 이모지만 하나 누른다.", type: "I" }, { text: "감사합니다! 등등 정성껏 답장한다.", type: "E" }]
            },
            {
                q: "친구와 약속을 잡을 때 나는?",
                a: [{ text: "당일 급만남이 최고다. '뭐해? 나와'가 좋다.", type: "P" }, { text: "최소 3일 전에는 약속이 잡혀있어야 마음이 편하다.", type: "J" }]
            },
            {
                q: "친구가 '나 요즘 너무 힘들어서 붕어빵 사먹었어'라고 한다면?",
                a: [{ text: "무슨 맛 먹었어? 슈붕? 팥붕?", type: "S" }, { text: "왜 힘들어? 무슨 일 있었어? ㅠㅠ", type: "F" }]
            },
            {
                q: "새로운 숏폼 챌린지가 유행한다면?",
                a: [{ text: "이미 속으로 춤 다 외웠고 혼자 찍어본다.", type: "E" }, { text: "구경만 해도 기 빨린다. 남들 하는 거 본다.", type: "I" }]
            },
            {
                q: "여행 계획을 세울 때 나의 모습은?",
                a: [{ text: "구글 맵에 가고 싶은 곳 다 찍고 시간 단위로 짠다.", type: "J" }, { text: "비행기 표만 있으면 어디든 갈 수 있어.", type: "P" }]
            },
            {
                q: "길 가다가 이상형을 발견했다면?",
                a: [{ text: "에어드랍으로 연락처를 남기거나 말을 건다.", type: "N" }, { text: "망상만 하다가 집에 와서 이불 찬다.", type: "S" }]
            },
            {
                q: "자기 전 침대에서 유튜브/인스타를 할 때?",
                a: [{ text: "정보성 영상이나 뉴스 등을 본다.", type: "T" }, { text: "감성 브이로그나 힐링 영상을 본다.", type: "F" }]
            },
            {
                q: "친구가 주식을 시작했다고 한다면?",
                a: [{ text: "어떤 종목 샀어? 수익률은?", type: "T" }, { text: "돈 잃으면 어떡해? 조심해서 해!", type: "F" }]
            }
        ];

        const results = {
            "ENTP": { title: "힙한 아이디어 뱅크", emoji: "😎", desc: "남들이 예 할 때 아니오를 외치는 프로 반항아. 하지만 실력은 확실해서 아무도 무시 못함. 폼 미쳤다!", good: "ISFJ", bad: "ESFJ" },
            "INFJ": { title: "겉차속따 도를 아십니까", emoji: "🔮", desc: "신비주의 그 자체. 속으로는 온갖 망상을 다 하지만 겉으로는 조용히 세상의 트렌드를 읽고 있음. 가끔 팩폭 날리면 무서움.", good: "ENFP", bad: "ESTP" },
            "ENFP": { title: "인간 탕후루 달디달다", emoji: "🍭", desc: "세상 모든 게 신나고 재밌는 리액션 기계. 금사빠 기질이 다분하며 에너지가 넘침. 하지만 가끔 혼자 있고 싶을 때 급격히 우울해짐.", good: "INFJ", bad: "ISTJ" },
            "ISTP": { title: "무소유 프로 귀차니스트", emoji: "🛹", desc: "만사가 귀찮지만 효율은 최고. 어쩔티비의 창시자 같은 느낌. 효율적이지 않은 일엔 절대로 몸을 움직이지 않음.", good: "ESFJ", bad: "ENFP" },
            "ESTJ": { title: "갓생 사는 워커홀릭", emoji: "💼", desc: "계획 없이는 숨도 못 쉼. 갓생 사는 법 강의해도 될 수준. 주변 사람들까지 갓생 살게 만드는 마법의 채찍질 전문가.", good: "INTP", bad: "INFP" },
            "ISFP": { title: "침대 위 예술가", emoji: "🎨", desc: "누워있는 게 세상에서 제일 행복함. 하지만 한 번 꽂히면 감성 뿜뿜하는 예술가 기질이 나옴. 착한데 고집은 은근히 셈.", good: "ENTJ", bad: "ESTJ" },
            // Simplified logic: If result doesn't exist, provide a default MZ type
            "DEFAULT": { title: "프로 갓반인", emoji: "✨", desc: "MZ와 꼰대 사이 그 어딘가에서 완벽한 밸런스를 유지하는 사람. 무난해 보이지만 사실은 가장 무서운 실력자!", good: "모든 사람", bad: "꼰대" }
        };

        let currentQuestion = 0;
        let score = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

        function startTest() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('question-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('question-number').innerText = `${currentQuestion + 1} / ${questions.length}`;
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('progress').style.width = `${((currentQuestion + 1) / questions.length) * 100}%`;
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            q.a.forEach((option, index) => {
                const button = document.createElement('button');
                button.className = "w-full text-left bg-white border-2 border-gray-100 hover:border-purple-500 hover:bg-purple-50 p-5 rounded-2xl transition-all font-medium text-gray-700 shadow-sm";
                button.innerText = option.text;
                button.onclick = () => nextQuestion(option.type);
                optionsDiv.appendChild(button);
            });
        }

        function nextQuestion(type) {
            score[type]++;
            currentQuestion++;
            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('question-screen').classList.add('hidden');
            document.getElementById('loading-screen').classList.remove('hidden');

            // Calculate MBTI string
            let mbti = "";
            mbti += (score.E >= score.I) ? "E" : "I";
            mbti += (score.S >= score.N) ? "S" : "N";
            mbti += (score.T >= score.F) ? "T" : "F";
            mbti += (score.J >= score.P) ? "J" : "P";

            setTimeout(() => {
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('result-screen').classList.remove('hidden');
                
                const result = results[mbti] || results["DEFAULT"];
                document.getElementById('result-title').innerText = result.title;
                document.getElementById('result-image').innerText = result.emoji;
                document.getElementById('result-desc').innerText = result.desc;
                document.getElementById('match-good').innerText = result.good;
                document.getElementById('match-bad').innerText = result.bad;
            }, 1500);
        }
    </script>
</body>
</html>
